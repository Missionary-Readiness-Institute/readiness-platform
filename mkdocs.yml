site_name: Missionary Readiness Institute
site_description: Practical training for faithful cross-cultural service.
site_url: https://missionaryreadiness.com/
repo_name: Missionary-Readiness-Institute/readiness-platform
repo_url: https://github.com/Missionary-Readiness-Institute/readiness-platform
exclude_docs: 'project/

  '
theme:
  name: material
  logo: assets/images/mri-logo.png
  favicon: assets/images/mri-favicon.png
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.top
  - search.highlight
  - search.suggest
  - content.code.copy
  palette:
  - scheme: default
    primary: custom
    accent: custom
    toggle:
      icon: material/weather-night
      name: Switch to dark mode
  - scheme: slate
    primary: custom
    accent: custom
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode
extra_css:
- assets/stylesheets/extra.css
- assets/stylesheets/skill-check.css
extra_javascript:
- assets/js/skill-check.js
extra:
  social:
  - icon: fontawesome/brands/facebook
    link: https://www.facebook.com/MissionaryReadinessInstitute
    name: Missionary Readiness Institute on Facebook
