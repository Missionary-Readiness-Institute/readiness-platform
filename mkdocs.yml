site_name: Missionary Readiness Institute
site_description: Practical training for faithful cross-cultural service.
site_url: https://missionary-readiness-institute.github.io/readiness-platform/

repo_name: Missionary-Readiness-Institute/readiness-platform
repo_url: https://github.com/Missionary-Readiness-Institute/readiness-platform

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - About: about.md
  - Mission & Vision: mission-vision.md
  - Courses:
      - Course Catalog: courses.md
      - Course Overview: courses/index.md
      - Spiritual Formation: courses/spiritual-formation.md
      - Cross-Cultural Service: courses/cross-cultural-service.md
      - Missionary Care: courses/missionary-care.md
      - Language Learning: courses/language-learning.md
      - Field Readiness: courses/field-readiness.md
  - Contact: contact.md
  - Policies:
      - Privacy Policy: privacy.md
      - Terms of Use: terms.md
      - License: license.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
